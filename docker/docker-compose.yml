version: "3.9"

# ============================================================
# GLM-OCR stack — RunPod serverless backend
#
# The model runs on RunPod; only the API server is needed here.
# Set RUNPOD_ENDPOINT_URL and RUNPOD_API_KEY in .env before starting.
# ============================================================

services:

  glmocr-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
